        /* 全体の設定 */
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }

        /* 親の箱：PCでは3列 */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* カードの設定 */
        .member-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .member-card img {
            width: 85%;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* スマホ設定：画面幅が770px以下の時は1列 */
        @media (max-width: 770px) {
            .member-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
