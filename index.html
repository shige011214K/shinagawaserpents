<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="google-site-verification" content="Zm3zqBDvMavwSWKXka-4iGd4KpKuoA2VOdZDelDJko0" />
    <meta charset="UTF-8">
    <title>品川サーペンツ</title>
    <style>
        body { margin: 0; background-color: black; overflow: hidden; }

        /* 画面全体を覆うカーテン */
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black; /* 黒く消えていく設定 */
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s; /* 1.5秒かけて変化 */
        }

        /* JSでこのクラスがつくと真っ黒になる */
        .is-faded {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <video id="myVideo" src="movie/serpents_logo_coin.mp4" autoplay muted playsinline width="100%">
    </video>

    <script>
        // 使う部品を全部つかまえる
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('fade-overlay');

        // 動画が終わった時の命令（1つにまとめます）
        video.addEventListener('ended', () => {
            // 1. まずカーテンを閉める（真っ黒にする）
            overlay.classList.add('is-faded');

            // 2. 1.5秒待ってから移動する
            setTimeout(() => {
                window.location.href = "top_2.html";
            }, 1500); 
        });
    </script>

</body>
</html>
