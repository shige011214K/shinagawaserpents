<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メンバー紹介 | 品川サーペンツ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }

        /* 全体を包む袋（これ1つだけでOK！） */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* リンクの見た目を消す設定 */
        .member-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .member-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s; /* マウスを乗せた時に少し動くオシャレ演出 */
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .member-card img {
            width: 100%; /* 枠いっぱいに広げる */
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* スマホ設定：770px以下は1列 */
        @media (max-width: 770px) {
            .member-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
